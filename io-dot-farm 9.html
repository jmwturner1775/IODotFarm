const SOCIAL_TAGS = ["X", "Youtube", "Reddit", "Local", "Events"];

function SocialPage() {
  const [accounts, setAccounts, loaded] = usePersistedState("daily-brief:social-accounts", []);
  const [feedUrl, setFeedUrl] = useState("");
  const [feedName, setFeedName] = useState("");
  const [feedTag, setFeedTag] = useState("X");
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef(null);
  const dropRef = useRef(null);

  // Seed default accounts and migrate IRL → Local
  useEffect(() => {
    if (!loaded) return;
    // Migrate old IRL tags to Local
    if (accounts.some((a) => a.tag === "IRL")) {
      setAccounts((prev) => prev.map((a) => a.tag === "IRL" ? { ...a, tag: "Local" } : a));
      return;
    }
    const defaults = [];
    if (!accounts.some((a) => a.tag === "Reddit")) {
      defaults.push(
        { id: Date.now(), name: "r/cambridge_uni", url: "https://www.reddit.com/r/cambridge_uni/.rss", tag: "Reddit", source: "url" },
        { id: Date.now() + 1, name: "r/cambridge", url: "https://www.reddit.com/r/cambridge/.rss", tag: "Reddit", source: "url" },
      );
    }
    if (defaults.length > 0) setAccounts((prev) => [...prev, ...defaults]);
  }, [loaded]);

  // Only fetch URL-based accounts
  const urlAccounts = accounts.filter((a) => a.source === "url" && a.url);
  const allFeeds = urlAccounts.map((a) => ({ name: a.name, rss: a.url, color: theme.muted }));
  const { articles, loading } = useRssFeeds(allFeeds.length > 0 ? allFeeds : []);

  const parseRssFile = (xmlText) => {
    try {
      const clean = xmlText.trim().replace(/^\uFEFF/, "");
      const parser = new DOMParser();
      const doc = parser.parseFromString(clean, "text/xml");
      let items = [...doc.querySelectorAll("item")];
      if (items.length === 0) items = [...doc.querySelectorAll("entry")];
      return items.slice(0, 30).map((item) => {
        const getText = (tags) => {
          for (const tag of tags) { const el = item.querySelector(tag); if (el?.textContent?.trim()) return el.textContent.trim(); }
          return "";
        };
        const getLink = () => { const el = item.querySelector("link"); return el?.getAttribute("href") || el?.textContent?.trim() || ""; };
        const getImage = () => {
          const enc = item.querySelector("enclosure");
          if (enc?.getAttribute("url")) return enc.getAttribute("url");
          const allEls = item.getElementsByTagName("*");
          for (let j = 0; j < allEls.length; j++) {
            const el = allEls[j];
            const ln = (el.localName || el.tagName || "").toLowerCase();
            if ((ln === "thumbnail" || ln === "content" || ln === "media:thumbnail" || ln === "media:content") && el.getAttribute("url")) return el.getAttribute("url");
          }
          // YouTube: video ID → thumbnail
          const linkEl = item.querySelector("link");
          const linkText = linkEl?.getAttribute("href") || linkEl?.textContent || "";
          const ytm = linkText.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
          if (ytm) return `https://i.ytimg.com/vi/${ytm[1]}/mqdefault.jpg`;
          for (let j = 0; j < allEls.length; j++) {
            const ln = (allEls[j].localName || allEls[j].tagName || "").toLowerCase();
            if ((ln === "videoid" || ln === "yt:videoid") && allEls[j].textContent) return `https://i.ytimg.com/vi/${allEls[j].textContent.trim()}/mqdefault.jpg`;
          }
          const descHtml = item.querySelector("description")?.textContent || item.querySelector("summary")?.textContent || "";
          const imgMatch = descHtml.match(/<img[^>]+src=["']([^"']+)/);
          if (imgMatch) return imgMatch[1];
          const urlMatch = descHtml.match(/(https?:\/\/[^\s"'<>]+\.(?:jpg|jpeg|png|gif|webp))/i);
          if (urlMatch) return urlMatch[1];
          return "";
        };
        return {
          title: getText(["title"]),
          link: getText(["link"]) || getLink(),
          pubDate: getText(["pubDate", "published", "updated"]),
          description: getText(["description", "summary"]).replace(/<[^>]*>/g, "").slice(0, 100),
          image: getImage(),
        };
      }).filter((a) => a.title);
    } catch { return []; }
  };

  const addFromUrl = () => {
    if (!feedUrl.trim() || !feedName.trim()) return;
    setAccounts((prev) => [...prev, { id: Date.now(), name: feedName.trim(), url: feedUrl.trim(), tag: feedTag, source: "url" }]);
    setFeedUrl(""); setFeedName("");
  };

  const processFile = async (file) => {
    if (!file) return;
    const text = await file.text();
    const parsed = parseRssFile(text);
    const name = feedName.trim() || file.name.replace(/\.[^.]+$/, "") || "Uploaded feed";
    setAccounts((prev) => [...prev, { id: Date.now(), name, tag: feedTag, source: "file", fileArticles: parsed }]);
    setFeedName("");
  };

  const handleFileInput = (e) => { processFile(e.target.files?.[0]); e.target.value = ""; };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragging(false);
    const file = e.dataTransfer?.files?.[0];
    if (file) processFile(file);
  };

  const removeAccount = (id) => setAccounts((prev) => prev.filter((a) => a.id !== id));

  // Merge all items for a tag, sorted chronologically

    // Sort by date descending

      const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
      const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
      return db - da;
    });
    return allItems;
  };

  if (!loaded) return null;

      {/* Grid: Add Feed left, IRL banner top-right, feed columns bottom-right */}

              </div>

function getC52Week() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const diff = now - start;
  const oneWeek = 7 * 24 * 60 * 60 * 1000;
  return Math.min(Math.ceil(diff / oneWeek), 52);
}

function getC52Task(weekNum) {
  let w = 0;
  for (const block of C52_WEEKS) {
    for (const task of block.tasks) {
      w++;
      if (w === weekNum) return { month: block.month, task, week: w };
    }
  }
  return { month: "Complete", task: "You finished C52!", week: weekNum };
}

      s.id = "pin-script";
      s.async = true;
      s.src = "https://assets.pinterest.com/js/pinit.js";
      s.setAttribute("data-pin-build", "doBuild");
      document.body.appendChild(s);
    } else if (window.doBuild) {
      window.doBuild();
    }
  }, []);

  useEffect(() => {
    const timer = setTimeout(() => { if (window.doBuild) window.doBuild(); }, 500);
    return () => clearTimeout(timer);
  });

  const allInspFeeds = inspFeeds.filter((f) => f.url).map((f) => ({ name: f.name, rss: f.url, color: theme.muted }));
  const allYtFeeds = ytFeeds.filter((f) => f.url).map((f) => ({ name: f.name, rss: f.url, color: theme.muted }));
  const { articles: inspArticles, loading: inspLoading } = useRssFeeds(allInspFeeds.length > 0 ? allInspFeeds : []);
  const { articles: ytArticles, loading: ytLoading } = useRssFeeds(allYtFeeds.length > 0 ? allYtFeeds : []);

  const parseFileToArticles = (text) => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(text.trim(), "text/xml");
    let items = [...doc.querySelectorAll("item")];
    if (items.length === 0) items = [...doc.querySelectorAll("entry")];
    return items.slice(0, 25).map((item) => {
      const getText = (tags) => { for (const t of tags) { const el = item.querySelector(t); if (el?.textContent?.trim()) return el.textContent.trim(); } return ""; };
      const getLink = () => { const el = item.querySelector("link"); return el?.getAttribute("href") || el?.textContent?.trim() || ""; };
      const descHtml = item.querySelector("description")?.textContent || item.querySelector("summary")?.textContent || "";
      const imgMatch = descHtml.match(/<img[^>]+src=["']([^"']+)/);
      const allEls = item.getElementsByTagName("*");
      let mediaImg = "";
      for (let j = 0; j < allEls.length; j++) {
        const ln = (allEls[j].localName || allEls[j].tagName || "").toLowerCase();
        if ((ln === "thumbnail" || ln === "content") && allEls[j].getAttribute("url")) { mediaImg = allEls[j].getAttribute("url"); break; }
      }
      const linkText = getText(["link"]) || getLink();
      const ytm = linkText.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      const ytThumb = ytm ? "https://i.ytimg.com/vi/" + ytm[1] + "/mqdefault.jpg" : "";
      return {
        title: getText(["title"]), link: linkText,
        pubDate: getText(["pubDate", "published", "updated"]),
        description: descHtml.replace(/<[^>]*>/g, "").slice(0, 140),
        image: mediaImg || (imgMatch ? imgMatch[1] : "") || ytThumb || "",
      };
    }).filter((a) => a.title);
  };

  const addInspFeed = () => {
    if (!feedName.trim() || !feedUrl.trim()) return;
    setInspFeeds((prev) => [...prev, { id: Date.now(), name: feedName.trim(), url: feedUrl.trim(), source: "url" }]);
    setFeedName(""); setFeedUrl("");
  };
  const addYtFeed = () => {
    if (!ytName.trim() || !ytUrl.trim()) return;
    setYtFeeds((prev) => [...prev, { id: Date.now(), name: ytName.trim(), url: ytUrl.trim(), source: "url" }]);
    setYtName(""); setYtUrl("");
  };

  const handleFileDrop = (e, setter, nameFallback) => {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    file.text().then((text) => {
      const parsed = parseFileToArticles(text);
      const name = nameFallback || file.name.replace(/\.\w+$/, "");
      if (parsed.length > 0) setter((prev) => [...prev, { id: Date.now(), name, source: "file", fileArticles: parsed }]);
    });
  };

  const handleFileInput = (e, setter, nameFallback) => {
    const file = e.target.files?.[0];
    if (!file) return;
    file.text().then((text) => {
      const parsed = parseFileToArticles(text);
      const name = nameFallback || file.name.replace(/\.\w+$/, "");
      if (parsed.length > 0) setter((prev) => [...prev, { id: Date.now(), name, source: "file", fileArticles: parsed }]);
    });
    e.target.value = "";
  };

  const removeInspFeed = (id) => setInspFeeds((prev) => prev.filter((f) => f.id !== id));
  const removeYtFeed = (id) => setYtFeeds((prev) => prev.filter((f) => f.id !== id));

  const mergeArticles = (feeds, articlesMap) => {
    const all = [];
    feeds.forEach((feed) => {
      if (feed.source === "file" && feed.fileArticles) {
        feed.fileArticles.forEach((item) => all.push({ ...item, source: feed.name }));
      } else {
        (articlesMap[feed.name] || []).forEach((item) => all.push({ ...item, source: feed.name }));
      }
    });
    all.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
    return all;
  };

  const allInspArticles = mergeArticles(inspFeeds, inspArticles);
  const allYtArticlesList = mergeArticles(ytFeeds, ytArticles);

  const weekNum = getC52Week();
  const c52 = getC52Task(weekNum);

  const renderFeedColumn = ({ title, feeds, arts, ld, nameVal, setNameVal, urlVal, setUrlVal, addFn, removeFn, fileRef, onFileInput, dragOver, setDragOver, onDrop, expandKey }) => {
    const expanded = expandKey === "inspExpand" ? inspExpand : ytExpand;
    const setExpanded = expandKey === "inspExpand" ? setInspExpand : setYtExpand;
    return (
    <Card style={{ padding: 0 }}>
      {/* Clickable title */}
      <div onClick={() => setExpanded(!expanded)} style={{
        fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, textTransform: "uppercase",
        letterSpacing: 1.5, color: theme.crimson, padding: "14px 20px 10px", cursor: "pointer",
        borderTop: `3px solid ${theme.crimson}`, borderBottom: `1px solid ${theme.light}`,
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        {title}
        <span style={{ fontSize: 10, color: theme.muted, fontWeight: 400 }}>{expanded ? "▲" : "▼"}</span>
      </div>

      {/* Collapsible upload section */}
      {expanded && (
        <div style={{ padding: "10px 20px", borderBottom: `1px solid ${theme.light}`, display: "flex", flexDirection: "column", gap: 6 }}>
          <input value={nameVal} onChange={(e) => setNameVal(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") addFn(); }}
            placeholder="Name"
            style={{ width: "100%", fontFamily: base.fontSans, fontSize: 11, padding: "6px 8px", border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none", boxSizing: "border-box" }} />
          <div style={{ display: "flex", gap: 4 }}>
            <input value={urlVal} onChange={(e) => setUrlVal(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") addFn(); }}
              placeholder="RSS URL"
              style={{ flex: 1, fontFamily: base.fontSans, fontSize: 11, padding: "6px 8px", border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none", boxSizing: "border-box" }} />
            <button onClick={addFn} style={{
              fontFamily: base.fontSans, fontSize: 10, padding: "5px 10px",
              border: "none", background: theme.dark, color: theme.paper, cursor: "pointer",
              opacity: nameVal.trim() && urlVal.trim() ? 1 : 0.4,
            }}>Add</button>
          </div>
          <input ref={fileRef} type="file" style={{ display: "none" }} onChange={(e) => onFileInput(e)} />
          <div
            onClick={(e) => { e.stopPropagation(); fileRef.current?.click(); }}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={(e) => { setDragOver(false); onDrop(e); }}
            style={{
              fontFamily: base.fontSans, fontSize: 10, padding: "10px 0", textAlign: "center",
              border: `2px dashed ${dragOver ? theme.crimson : theme.border}`,
              background: dragOver ? theme.light : theme.salmon, color: theme.muted,
              cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.3, transition: "all 0.15s",
            }}>Drop file or click to upload</div>
          {feeds.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 2 }}>
              {feeds.map((f) => (
                <span key={f.id} style={{
                  fontFamily: base.fontSans, fontSize: 9, padding: "2px 8px",
                  background: theme.light, color: theme.text, borderRadius: 2,
                  display: "inline-flex", alignItems: "center", gap: 4,
                }}>
                  {f.name}
                  <span onClick={() => removeFn(f.id)} style={{ cursor: "pointer", color: theme.muted, fontWeight: 700 }}>×</span>
                </span>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Feed chips when collapsed */}
      {!expanded && feeds.length > 0 && (
        <div style={{ padding: "6px 20px", display: "flex", flexWrap: "wrap", gap: 3 }}>
          {feeds.map((f) => (
            <span key={f.id} style={{ fontFamily: base.fontSans, fontSize: 8, padding: "1px 6px", background: theme.light, color: theme.muted, borderRadius: 2 }}>{f.name}</span>
          ))}
        </div>
      )}

      {/* Articles with full-width images */}
      <div style={{ maxHeight: 750, overflowY: "auto", padding: "0 16px 16px" }}>
        {feeds.length === 0 ? (
          <div style={{ fontFamily: base.fontBody, fontSize: 12, color: theme.muted, fontStyle: "italic", textAlign: "center", padding: "20px 0" }}>
            Click title to add feeds.
          </div>
        ) : ld && arts.length === 0 ? (
          <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, fontStyle: "italic", padding: 10 }}>Loading...</div>
        ) : arts.length === 0 ? (
          <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, fontStyle: "italic", padding: 10 }}>No posts found</div>
        ) : (
          arts.slice(0, 30).map((item, i) => (
            <a key={i} href={item.link} target="_blank" rel="noopener noreferrer" style={{
              display: "block", textDecoration: "none", marginTop: 10,
              paddingBottom: 10, borderBottom: `1px solid ${theme.light}`,
            }}>
              {item.image && (
                <img referrerPolicy="no-referrer" src={item.image} alt="" style={{
                  width: "100%", objectFit: "contain", borderRadius: 2,
                  marginBottom: 6, background: theme.light, display: "block",
                }} onError={(e) => { e.target.style.display = "none"; }} />
              )}
              <div style={{ fontFamily: base.fontSans, fontSize: 12, fontWeight: 500, color: theme.text, lineHeight: 1.3 }}>{item.title}</div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted }}>{item.source}</span>
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.teal }}>{timeAgo(item.pubDate)}</span>
              </div>
            </a>
          ))
        )}
      </div>
    </Card>
    );
  };

  return (
    <div style={{ padding: 20, display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr)", gap: 14, alignItems: "start" }}>
      {/* Col 1: C52 + Gallery */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card accent>
          <div style={{ fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: theme.crimson, marginBottom: 4 }}>
            C52 Week {weekNum}
          </div>
          <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.teal, marginBottom: 8 }}>{c52.month}</div>
          <div style={{ fontFamily: base.fontSerif, fontSize: 16, fontWeight: 700, color: theme.dark, lineHeight: 1.35 }}>
            {c52.task}
          </div>
          <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ flex: 1, height: 6, background: theme.light, borderRadius: 3, overflow: "hidden" }}>
              <div style={{ width: `${(weekNum / 52) * 100}%`, height: "100%", background: theme.crimson, borderRadius: 3 }} />
            </div>
            <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted }}>{weekNum}/52</span>
          </div>
        </Card>
        <Card style={{ padding: 0 }}>
          {/* Clickable title */}
          <div onClick={() => setIdeasExpand(!ideasExpand)} style={{
            fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, textTransform: "uppercase",
            letterSpacing: 1.5, color: theme.crimson, padding: "14px 20px 10px", cursor: "pointer",
            borderBottom: `1px solid ${theme.light}`,
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            Art Ideas
            <span style={{ fontSize: 10, color: theme.muted, fontWeight: 400 }}>{ideasExpand ? "▲" : "▼"}</span>
          </div>

          {/* Collapsible input */}
          {ideasExpand && (
            <div style={{ padding: "10px 20px", borderBottom: `1px solid ${theme.light}` }}>
              <div style={{ display: "flex", gap: 4, marginBottom: 6 }}>
                <input value={ideaInput} onChange={(e) => setIdeaInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && (ideaInput.trim() || ideaImages.length > 0)) {
                      setArtIdeas((prev) => [{ id: Date.now(), text: ideaInput.trim(), images: ideaImages, done: false }, ...prev]);
                      setIdeaInput(""); setIdeaImages([]);
                    }
                  }}
                  onPaste={(e) => {
                    const items = e.clipboardData?.items;
                    if (!items) return;
                    for (let i = 0; i < items.length; i++) {
                      if (items[i].type.startsWith("image/")) {
                        e.preventDefault();
                        const file = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = () => setIdeaImages((prev) => [...prev, reader.result]);
                        reader.readAsDataURL(file);
                      }
                    }
                  }}
                  placeholder="Sketch idea, concept, prompt..."
                  style={{ flex: 1, fontFamily: base.fontSans, fontSize: 11, padding: "6px 8px", border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none", boxSizing: "border-box" }} />
                <button onClick={() => {
                  if (ideaInput.trim() || ideaImages.length > 0) {
                    setArtIdeas((prev) => [{ id: Date.now(), text: ideaInput.trim(), images: ideaImages, done: false }, ...prev]);
                    setIdeaInput(""); setIdeaImages([]);
                  }
                }} style={{
                  fontFamily: base.fontSans, fontSize: 10, padding: "5px 10px",
                  border: "none", background: theme.dark, color: theme.paper, cursor: "pointer",
                  opacity: (ideaInput.trim() || ideaImages.length > 0) ? 1 : 0.4,
                }}>Add</button>
              </div>
              {/* Image drop zone + file input */}
              <input ref={ideaFileRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={(e) => {
                [...(e.target.files || [])].forEach((file) => {
                  const reader = new FileReader();
                  reader.onload = () => setIdeaImages((prev) => [...prev, reader.result]);
                  reader.readAsDataURL(file);
                });
                e.target.value = "";
              }} />
              <div
                onClick={(e) => { e.stopPropagation(); ideaFileRef.current?.click(); }}
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => {
                  e.preventDefault();
                  [...(e.dataTransfer?.files || [])].forEach((file) => {
                    if (file.type.startsWith("image/")) {
                      const reader = new FileReader();
                      reader.onload = () => setIdeaImages((prev) => [...prev, reader.result]);
                      reader.readAsDataURL(file);
                    }
                  });
                }}
                style={{
                  fontFamily: base.fontSans, fontSize: 9, padding: "8px 0", textAlign: "center",
                  border: `1px dashed ${theme.border}`, background: theme.salmon, color: theme.muted,
                  cursor: "pointer", letterSpacing: 0.3, transition: "all 0.15s",
                }}>Drop, paste, or click to add images</div>
              {/* Image preview */}
              {ideaImages.length > 0 && (
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
                  {ideaImages.map((img, i) => (
                    <div key={i} style={{ position: "relative" }}>
                      <img src={img} alt="" style={{ width: 48, height: 48, objectFit: "cover", borderRadius: 2, border: `1px solid ${theme.border}` }} />
                      <button onClick={() => setIdeaImages((prev) => prev.filter((_, j) => j !== i))} style={{
                        position: "absolute", top: -4, right: -4, width: 14, height: 14, borderRadius: "50%",
                        background: theme.crimson, color: theme.paper, border: "none", cursor: "pointer",
                        fontSize: 9, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center",
                      }}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Ideas list */}
          <div style={{ maxHeight: 450, overflowY: "auto", padding: "6px 16px 16px" }}>
            {artIdeas.length === 0 ? (
              <div style={{ fontFamily: base.fontBody, fontSize: 12, color: theme.muted, fontStyle: "italic", textAlign: "center", padding: "20px 0" }}>
                Click title to add ideas.
              </div>
            ) : (
              artIdeas.map((idea) => (
                <div key={idea.id} style={{
                  padding: "6px 0", borderBottom: `1px solid ${theme.light}`,
                  opacity: idea.done ? 0.4 : 1,
                }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                    <input type="checkbox" checked={idea.done || false}
                      onChange={() => setArtIdeas((prev) => prev.map((i) => i.id === idea.id ? { ...i, done: !i.done } : i))}
                      style={{ marginTop: 3, accentColor: theme.crimson, flexShrink: 0 }} />
                    <div style={{
                      fontFamily: base.fontSans, fontSize: 12, color: theme.text, lineHeight: 1.4, flex: 1,
                      textDecoration: idea.done ? "line-through" : "none",
                    }}>{idea.text || "(image only)"}</div>
                    <button onClick={() => setArtIdeas((prev) => prev.filter((i) => i.id !== idea.id))} style={{
                      fontSize: 11, color: theme.muted, background: "none", border: "none", cursor: "pointer", lineHeight: 1, flexShrink: 0,
                    }}>×</button>
                  </div>
                  {idea.images && idea.images.length > 0 && (
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 4, marginLeft: 22 }}>
                      {idea.images.map((img, i) => (
                        <img key={i} src={img} alt="" style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 2, border: `1px solid ${theme.border}`, cursor: "pointer" }}
                          onClick={() => window.open(img, "_blank")} />
                      ))}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>
        </Card>
      </div>

      {/* Col 2: Twitter Art */}
      <div>
        {renderFeedColumn({
          title: "Twitter Art", feeds: inspFeeds, arts: allInspArticles, ld: inspLoading,
          nameVal: feedName, setNameVal: setFeedName, urlVal: feedUrl, setUrlVal: setFeedUrl,
          addFn: addInspFeed, removeFn: removeInspFeed, fileRef: inspFileRef,
          onFileInput: (e) => handleFileInput(e, setInspFeeds, feedName.trim()),
          dragOver: dragOverInsp, setDragOver: setDragOverInsp,
          onDrop: (e) => handleFileDrop(e, setInspFeeds, feedName.trim()),
          expandKey: "inspExpand",
        })}
      </div>

      {/* Col 3: Pinterest Board Widget */}
      <div>
        <Card title="Pinterest" accent style={{ padding: "14px 10px" }}>
          <div ref={pinRef} style={{ maxHeight: 850, overflowY: "auto" }}>
            <a data-pin-do="embedBoard"
              href="https://www.pinterest.com/owmybaroquendick/art-that-gets-me-loading-up-clip-studio-at-3am/"
              data-pin-scale-width="115"
              data-pin-scale-height="900"
              data-pin-board-width="260"
            ></a>
          </div>
        </Card>
      </div>

      {/* Col 4: YouTube Art */}
      <div>
        {renderFeedColumn({
          title: "YouTube Art", feeds: ytFeeds, arts: allYtArticlesList, ld: ytLoading,
          nameVal: ytName, setNameVal: setYtName, urlVal: ytUrl, setUrlVal: setYtUrl,
          addFn: addYtFeed, removeFn: removeYtFeed, fileRef: ytFileRef,
          onFileInput: (e) => handleFileInput(e, setYtFeeds, ytName.trim()),
          dragOver: dragOverYt, setDragOver: setDragOverYt,
          onDrop: (e) => handleFileDrop(e, setYtFeeds, ytName.trim()),
          expandKey: "ytExpand",
        })}
      </div>
    </div>
  );
}

/* ─── HEALTH PAGE ─── */
function HealthPage() {
  const [healthData, setHealthData, loaded] = usePersistedState("daily-brief:health", {});
  const todayKey = new Date().toISOString().slice(0, 10);

  const today = healthData[todayKey] || { water: 0, sleep: "", exercise: [], meals: [], notes: "" };

  const updateToday = (updates) => {
    setHealthData((prev) => ({
      ...prev,
      [todayKey]: { ...today, ...updates },
    }));
  };

  const [exerciseInput, setExerciseInput] = useState("");
  const [mealInput, setMealInput] = useState("");

  // Last 7 days for the overview
  const weekDays = [...Array(7)].map((_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (6 - i));
    const key = d.toISOString().slice(0, 10);
    const data = healthData[key] || {};
    return {
      key,
      label: d.toLocaleDateString("en-GB", { weekday: "short" }),
      water: data.water || 0,
      sleep: parseFloat(data.sleep) || 0,
      exerciseCount: (data.exercise || []).length,
      mealCount: (data.meals || []).length,
      isToday: key === todayKey,
    };
  });

  if (!loaded) return null;

  return (
    <div style={{ padding: 20, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
      {/* ── Left: Today's Tracking ── */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card accent>
          <h2 style={{ fontFamily: base.fontSerif, fontSize: 22, fontWeight: 700, color: theme.dark, margin: "0 0 14px" }}>
            Today
          </h2>

          {/* Water */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
              Water — {today.water} glasses
            </div>
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              {[1,2,3,4,5,6,7,8].map((n) => (
                <button key={n} onClick={() => updateToday({ water: n })} style={{
                  width: 28, height: 28, borderRadius: "50%", cursor: "pointer",
                  border: `1.5px solid ${n <= today.water ? "#4A6FA5" : theme.border}`,
                  background: n <= today.water ? "#4A6FA5" : "transparent",
                  color: n <= today.water ? theme.paper : theme.muted,
                  fontFamily: base.fontSans, fontSize: 11, fontWeight: 600,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.15s",
                }}>
                  {n}
                </button>
              ))}
            </div>
          </div>

          {/* Sleep */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
              Sleep (hours)
            </div>
            <input
              type="number" step="0.5" min="0" max="14"
              value={today.sleep}
              onChange={(e) => updateToday({ sleep: e.target.value })}
              placeholder="e.g. 7.5"
              style={{
                fontFamily: base.fontSans, fontSize: 13, padding: "7px 10px", width: 100,
                border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none",
              }}
            />
          </div>

          {/* Exercise */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
              Exercise
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input
                value={exerciseInput}
                onChange={(e) => setExerciseInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter" && exerciseInput.trim()) {
                    updateToday({ exercise: [...today.exercise, exerciseInput.trim()] });
                    setExerciseInput("");
                  }
                }}
                placeholder="e.g. 30 min run, yoga..."
                style={{
                  flex: 1, fontFamily: base.fontSans, fontSize: 12, padding: "7px 10px",
                  border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none",
                }}
              />
              <button onClick={() => {
                if (exerciseInput.trim()) { updateToday({ exercise: [...today.exercise, exerciseInput.trim()] }); setExerciseInput(""); }
              }} style={{
                fontFamily: base.fontSans, fontSize: 11, padding: "7px 12px",
                border: "none", background: theme.teal, color: theme.paper, cursor: "pointer",
              }}>Add</button>
            </div>
            {today.exercise.map((ex, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0", borderBottom: `1px solid ${theme.light}` }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 12, color: theme.text }}>• {ex}</span>
                <button onClick={() => updateToday({ exercise: today.exercise.filter((_, j) => j !== i) })} style={{
                  fontFamily: base.fontSans, fontSize: 13, color: theme.muted, background: "none", border: "none", cursor: "pointer",
                }}>×</button>
              </div>
            ))}
          </div>

          {/* Meals */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
              Meals
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input
                value={mealInput}
                onChange={(e) => setMealInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter" && mealInput.trim()) {
                    updateToday({ meals: [...today.meals, mealInput.trim()] });
                    setMealInput("");
                  }
                }}
                placeholder="e.g. porridge, salad, pasta..."
                style={{
                  flex: 1, fontFamily: base.fontSans, fontSize: 12, padding: "7px 10px",
                  border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none",
                }}
              />
              <button onClick={() => {
                if (mealInput.trim()) { updateToday({ meals: [...today.meals, mealInput.trim()] }); setMealInput(""); }
              }} style={{
                fontFamily: base.fontSans, fontSize: 11, padding: "7px 12px",
                border: "none", background: theme.teal, color: theme.paper, cursor: "pointer",
              }}>Add</button>
            </div>
            {today.meals.map((meal, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0", borderBottom: `1px solid ${theme.light}` }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 12, color: theme.text }}>• {meal}</span>
                <button onClick={() => updateToday({ meals: today.meals.filter((_, j) => j !== i) })} style={{
                  fontFamily: base.fontSans, fontSize: 13, color: theme.muted, background: "none", border: "none", cursor: "pointer",
                }}>×</button>
              </div>
            ))}
          </div>

          {/* Notes */}
          <div>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
              Notes
            </div>
            <textarea
              value={today.notes}
              onChange={(e) => updateToday({ notes: e.target.value })}
              placeholder="How are you feeling today..."
              rows={3}
              style={{
                width: "100%", fontFamily: base.fontBody, fontSize: 13, lineHeight: 1.6, padding: 10,
                border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text,
                outline: "none", resize: "vertical", boxSizing: "border-box",
              }}
            />
          </div>
        </Card>
      </div>

      {/* ── Right: Weekly Overview ── */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <Card title="This Week — Water">
          <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100 }}>
            {weekDays.map((d) => (
              <div key={d.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted }}>{d.water > 0 ? d.water : ""}</span>
                <div style={{
                  width: "100%", background: d.isToday ? "#4A6FA5" : "#4A6FA5",
                  height: `${Math.max((d.water / 8) * 70, d.water > 0 ? 4 : 0)}px`,
                  borderRadius: "2px 2px 0 0", opacity: d.isToday ? 1 : 0.5,
                }} />
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted, fontWeight: d.isToday ? 600 : 400 }}>{d.label}</span>
              </div>
            ))}
          </div>
        </Card>

        <Card title="This Week — Sleep">
          <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100 }}>
            {weekDays.map((d) => (
              <div key={d.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted }}>{d.sleep > 0 ? `${d.sleep}h` : ""}</span>
                <div style={{
                  width: "100%", background: d.isToday ? theme.teal : theme.teal,
                  height: `${Math.max((d.sleep / 10) * 70, d.sleep > 0 ? 4 : 0)}px`,
                  borderRadius: "2px 2px 0 0", opacity: d.isToday ? 1 : 0.5,
                }} />
                <span style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted, fontWeight: d.isToday ? 600 : 400 }}>{d.label}</span>
              </div>
            ))}
          </div>
        </Card>

        <Card title="Activity Summary">
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {weekDays.filter((d) => d.exerciseCount > 0 || d.mealCount > 0).reverse().slice(0, 5).map((d) => (
              <div key={d.key} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${theme.light}` }}>
                <span style={{ fontFamily: base.fontSans, fontSize: 12, color: theme.text, fontWeight: d.isToday ? 600 : 400 }}>{d.label}</span>
                <span style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted }}>
                  {d.exerciseCount} exercise · {d.mealCount} meals
                </span>
              </div>
            ))}
            {weekDays.every((d) => d.exerciseCount === 0 && d.mealCount === 0) && (
              <div style={{ fontFamily: base.fontBody, fontSize: 13, color: theme.muted, fontStyle: "italic", textAlign: "center", padding: 10 }}>
                Start tracking to see your week here.
              </div>
            )}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ─── LIFE PAGE ─── */
function LifePage({ wisdom, setWisdom }) {
  const removeWisdom = (id) => setWisdom((prev) => prev.filter((w) => w.id !== id));

  // Group by energy level
  const grouped = {};
  ENERGY_LEVELS.forEach((lvl) => {
    grouped[lvl.value] = wisdom.filter((w) => w.energy === lvl.value);
  });

  return (
    <div style={{ padding: 20, maxWidth: 750, margin: "0 auto" }}>
      <h2 style={{ fontFamily: base.fontSerif, fontSize: 28, fontWeight: 700, color: theme.dark, margin: "0 0 4px" }}>Life</h2>
      <p style={{ fontFamily: base.fontBody, fontSize: 14, color: theme.muted, margin: "0 0 20px", fontStyle: "italic" }}>
        Words of wisdom, tagged by energy level. Add them via "Write it down → For Life" on the Home page.
      </p>

      {wisdom.length === 0 ? (
        <Card>
          <p style={{ fontFamily: base.fontBody, fontStyle: "italic", color: theme.muted, fontSize: 14, textAlign: "center", margin: 0 }}>
            No words of wisdom yet. Use "For Life" on the Home page to save one.
          </p>
        </Card>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {ENERGY_LEVELS.map((lvl) => {
            const items = grouped[lvl.value];
            if (!items || items.length === 0) return null;
            return (
              <Card key={lvl.value} title={`${lvl.label} (${items.length})`} style={{ borderLeft: `3px solid ${lvl.color}` }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                  {items.map((w, i) => (
                    <div key={w.id} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10,
                      padding: "10px 0",
                      borderBottom: i < items.length - 1 ? `1px solid ${theme.light}` : "none",
                    }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontFamily: base.fontBody, fontSize: 15, color: theme.text, fontStyle: "italic", lineHeight: 1.5 }}>
                          "{w.text}"
                        </div>
                        <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, marginTop: 4 }}>
                          {new Date(w.date).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })} · {new Date(w.date).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}
                        </div>
                      </div>
                      <button
                        onClick={() => removeWisdom(w.id)}
                        style={{
                          fontFamily: base.fontSans, fontSize: 14, color: theme.muted, background: "none",
                          border: "none", cursor: "pointer", padding: "0 2px", lineHeight: 1, flexShrink: 0,
                        }}
                      >×</button>
                    </div>
                  ))}
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── MAIN APP ─── */
function App() {
  const [page, setPage] = useState("Home");
  const [sessions, setSessions, sessionsLoaded] = usePersistedState("daily-brief:sessions", []);
  const [journalEntries, setJournalEntries, journalLoaded] = usePersistedState("daily-brief:journal", []);
  const [writedowns, setWritedowns, writedownsLoaded] = usePersistedState("daily-brief:writedowns", []);
  const [wisdom, setWisdom, wisdomLoaded] = usePersistedState("daily-brief:wisdom", []);

  // Arrow key tab navigation
  useEffect(() => {
    const handleKey = (e) => {
      // Don't navigate if user is typing in an input/textarea
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        e.preventDefault();
        setPage((prev) => {
          const idx = PAGES.indexOf(prev);
          if (e.key === "ArrowLeft") return PAGES[(idx - 1 + PAGES.length) % PAGES.length];
          return PAGES[(idx + 1) % PAGES.length];
        });
      }
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, []);

  if (!sessionsLoaded || !journalLoaded || !writedownsLoaded || !wisdomLoaded) {
    return (
      <div style={{ minHeight: "100vh", background: theme.salmon, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 20, color: theme.muted, fontStyle: "italic" }}>Loading...</p>
      </div>
    );
  }

  return (
    <>
      <link href={FONT_LINK} rel="stylesheet" />
      <style dangerouslySetInnerHTML={{ __html: `
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #EDE3D0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #B8A88A; border-radius: 4px; min-height: 30px; }
        ::-webkit-scrollbar-thumb:hover { background: #8B7D6B; }
        * { scrollbar-width: thin; scrollbar-color: #B8A88A #EDE3D0; }
      `}} />
      <div style={{
        minHeight: "100vh", background: theme.salmon, color: theme.text,
        fontFamily: base.fontBody,
      }}>
        <div style={{ maxWidth: 1280, margin: "0 auto" }}>
          <Masthead page={page} setPage={setPage} entries={journalEntries} />
          <main>
            <div style={{ display: page === "Home" ? "block" : "none" }}>
              <FrontPage sessions={sessions} setPage={setPage} writedowns={writedowns} setWritedowns={setWritedowns} wisdom={wisdom} setWisdom={setWisdom} />
            </div>
            <div style={{ display: page === "Journal" ? "block" : "none" }}>
              <JournalPage entries={journalEntries} setEntries={setJournalEntries} writedowns={writedowns} setWritedowns={setWritedowns} wisdom={wisdom} />
            </div>
            <div style={{ display: page === "Study" ? "block" : "none" }}>
              <StudyPage sessions={sessions} setSessions={setSessions} />
            </div>
            <div style={{ display: page === "News" ? "block" : "none" }}>
              <NewsPage />
            </div>
            <div style={{ display: page === "Commercial" ? "block" : "none" }}>
              <CommercialPage />
            </div>
            <div style={{ display: page === "Media" ? "block" : "none" }}>
              <RecommendationsPage />
            </div>
            <div style={{ display: page === "Social" ? "block" : "none" }}>
              <SocialPage />
            </div>
            <div style={{ display: page === "Art" ? "block" : "none" }}>
              <ArtPage />
            </div>
            <div style={{ display: page === "Health" ? "block" : "none" }}>
              <HealthPage />
            </div>
            <div style={{ display: page === "Life" ? "block" : "none" }}>
              <LifePage wisdom={wisdom} setWisdom={setWisdom} />
            </div>
          </main>
          <footer style={{
            textAlign: "center", padding: "20px", borderTop: `1px solid ${theme.border}`,
            fontFamily: base.fontSans, fontSize: 10, color: theme.muted, letterSpacing: 0.5,
          }}>
            IO DOT FARM — {new Date().getFullYear()}
          </footer>
        </div>
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));root.render(<App />);
</script></body></html>
