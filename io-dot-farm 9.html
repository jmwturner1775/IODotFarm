/* ─── Persistence Hook (localStorage) ─── */
function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => {
    try { const stored = localStorage.getItem(key); return stored ? JSON.parse(stored) : defaultValue; } catch { return defaultValue; }
  });
  const [loaded] = useState(true);
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch {} }, [state, key]);
  return [state, setState, loaded];
}

function Masthead({ page, setPage, entries }) {
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-GB", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
  });

  // Mood face from last 3 journal entries with energy
  const withEnergy = (entries || []).filter((e) => e.energy).slice(0, 3);
  let moodFace = null;
  if (withEnergy.length > 0) {
    const avg = withEnergy.reduce((a, e) => a + e.energy, 0) / withEnergy.length;
    const level = Math.round(avg);
    const faces = {
      1: { face: ":(", color: "#4A6FA5" },
      2: { face: ":/", color: "#6A8EBF" },
      3: { face: ":|", color: "#8B8B5E" },
      4: { face: ":)", color: "#BF7B4A" },
      5: { face: ":D", color: "#A84032" },
    };
    const { face, color } = faces[level] || faces[3];
    moodFace = { face, color };
  }

  return (
    <header style={{ borderBottom: `1px solid ${theme.dark}`, marginBottom: 0, background: theme.salmon }}>
      {/* Top bar: title left, date center, mood+weather right */}
      <div style={{ display: "flex", alignItems: "center", padding: "8px 20px", gap: 12 }}>

          {dateStr}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          {moodFace && (
            <span style={{ fontFamily: base.fontSans, fontSize: 16, color: moodFace.color, fontWeight: 700 }}>
              {moodFace.face}
            </span>
          )}
          <span style={{ fontSize: 18, lineHeight: 1 }} title={`${WEATHER.current.temp}°C — ${WEATHER.current.condition}`}>{WEATHER.current.icon}</span>

/* ─── RSS Feed Hook ─── */
const _rssCache = {};
const _rssPending = {};

function useRssFeeds(feeds) {
  const [articles, setArticles] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;

    function parseRssXml(xmlText) {
      try {
        if (!xmlText || typeof xmlText !== "string") return [];
        const clean = xmlText.trim().replace(/^\uFEFF/, "");
        if (!clean.includes("<item") && !clean.includes("<entry")) return [];
        const parser = new DOMParser();
        const doc = parser.parseFromString(clean, "text/xml");
        if (doc.querySelector("parsererror")) return [];
        let items = [...doc.querySelectorAll("item")];
        if (items.length === 0) items = [...doc.querySelectorAll("entry")];
        return items.slice(0, 25).map((item) => {
          const getText = (tags) => {
            for (const tag of tags) {
              const el = item.querySelector(tag);
              if (el?.textContent?.trim()) return el.textContent.trim();
            }
            return "";
          };
          const getLink = () => {
            const linkEl = item.querySelector("link");
            return linkEl?.getAttribute("href") || linkEl?.textContent?.trim() || "";
          };
          const getImage = () => {
            const enc = item.querySelector("enclosure");
            if (enc?.getAttribute("url")) return enc.getAttribute("url");
            // Scan all child elements for media:thumbnail, media:content, etc.
            const allEls = item.getElementsByTagName("*");
            for (let j = 0; j < allEls.length; j++) {
              const el = allEls[j];
              const ln = (el.localName || el.tagName || "").toLowerCase();
              if ((ln === "thumbnail" || ln === "content" || ln === "media:thumbnail" || ln === "media:content") && el.getAttribute("url")) return el.getAttribute("url");
            }
            // YouTube: extract video ID and build thumbnail URL
            const linkText = item.querySelector("link")?.getAttribute("href") || item.querySelector("link")?.textContent || "";
            const ytMatch = linkText.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (ytMatch) return `https://i.ytimg.com/vi/${ytMatch[1]}/mqdefault.jpg`;
            // yt:videoId element
            for (let j = 0; j < allEls.length; j++) {
              const el = allEls[j];
              const ln = (el.localName || el.tagName || "").toLowerCase();
              if ((ln === "videoid" || ln === "yt:videoid") && el.textContent) return `https://i.ytimg.com/vi/${el.textContent.trim()}/mqdefault.jpg`;
            }
            // Image in description HTML
            const descHtml = item.querySelector("description")?.textContent || item.querySelector("summary")?.textContent || "";
            const imgMatch = descHtml.match(/<img[^>]+src=["']([^"']+)/);
            if (imgMatch) return imgMatch[1];
            const urlMatch = descHtml.match(/(https?:\/\/[^\s"'<>]+\.(?:jpg|jpeg|png|gif|webp))/i);
            if (urlMatch) return urlMatch[1];
            return "";
          };
          const desc = getText(["description", "summary", "content"]).replace(/<[^>]*>/g, "").slice(0, 140);
          return {
            title: getText(["title"]),
            link: getText(["link"]) || getLink(),
            pubDate: getText(["pubDate", "published", "updated", "dc\\:date"]),
            description: desc,
            image: getImage(),
          };
        }).filter((a) => a.title);
      } catch { return []; }
    }

    async function tryFetch(url, timeout = 6000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const resp = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        return resp;
      } catch (e) { clearTimeout(timer); throw e; }
    }

    async function fetchFeedRaw(rssUrl) {
      // 1: Direct
      try { const r = await tryFetch(rssUrl, 1500); if (r.ok) { const xml = await r.text(); const p = parseRssXml(xml); if (p.length > 0) return p; } } catch {}
      // 2: rss2json (best for YouTube)
      try {
        const r = await tryFetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`, 8000);
        const d = await r.json();
        if (d.status === "ok" && d.items?.length > 0) return d.items.slice(0, 25).map((item) => {
          let img = item.thumbnail || item.enclosure?.link || "";
          // YouTube: extract thumbnail from video link
          if (!img && item.link) {
            const ytm = item.link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (ytm) img = `https://i.ytimg.com/vi/${ytm[1]}/mqdefault.jpg`;
          }
          // Pinterest: extract image from description HTML
          if (!img && item.description) {
            const m = item.description.match(/<img[^>]+src=["']([^"']+)/);
            if (m) img = m[1];
          }
          return { title: item.title || "", link: item.link || "", pubDate: item.pubDate || "", description: (item.description || "").replace(/<[^>]*>/g, "").slice(0, 140), image: img };
        });
      } catch {}
      // 3: allorigins /get
      try { const r = await tryFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`); const json = await r.json(); if (json.contents) { const p = parseRssXml(json.contents); if (p.length > 0) return p; } } catch {}
      // 4: corsproxy.io
      try { const r = await tryFetch(`https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`); const xml = await r.text(); const p = parseRssXml(xml); if (p.length > 0) return p; } catch {}
      // 5: codetabs
      try { const r = await tryFetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rssUrl)}`); const xml = await r.text(); const p = parseRssXml(xml); if (p.length > 0) return p; } catch {}
      // 6: allorigins /raw
      try { const r = await tryFetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`); const xml = await r.text(); const p = parseRssXml(xml); if (p.length > 0) return p; } catch {}
      return [];
    }

    // Cached + deduplicated fetch
    async function fetchFeed(rssUrl) {
      if (_rssCache[rssUrl] && Date.now() - _rssCache[rssUrl].time < 300000) return _rssCache[rssUrl].data;
      if (_rssPending[rssUrl]) return _rssPending[rssUrl];
      const promise = fetchFeedRaw(rssUrl).then((data) => { _rssCache[rssUrl] = { data, time: Date.now() }; delete _rssPending[rssUrl]; return data; });
      _rssPending[rssUrl] = promise;
      return promise;
    }

    async function fetchAll() {
      setLoading(true);
      const results = {};
      // Fetch all feeds in parallel
      const promises = feeds.map(async (feed) => {
        if (cancelled) return;
        const data = await fetchFeed(feed.rss);
        results[feed.name] = data;
        // Update progressively as each feed arrives
        if (!cancelled) setArticles((prev) => ({ ...prev, [feed.name]: data }));
      });
      await Promise.allSettled(promises);
      if (!cancelled) { setArticles(results); setLoading(false); }
    }

    fetchAll();
    // Force loading to false after 10s even if fetches haven't completed (sandbox protection)
    const loadingTimeout = setTimeout(() => { if (!cancelled) setLoading(false); }, 20000);
    const interval = setInterval(fetchAll, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); clearTimeout(loadingTimeout); };
  }, []);

  return { articles, loading };
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

/* ─── Claude Query Chat ─── */
function ClaudeQuery() {
  const [apiKey, setApiKey, keyLoaded] = usePersistedState("daily-brief:claude-key", "");
  const [keyInput, setKeyInput] = useState("");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const saveKey = () => {
    if (keyInput.trim()) { setApiKey(keyInput.trim()); setKeyInput(""); }
  };

  const logout = () => {
    setApiKey("");
    setMessages([]);
  };

  const send = async () => {
    if (!input.trim() || loading || !apiKey) return;
    const userMsg = { role: "user", content: input.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-opus-4-6",
          max_tokens: 1000,
          system: "You are a helpful study assistant embedded in a personal dashboard called IO Dot Farm. Keep responses concise and practical. The user is a UK university student.",
          messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await response.json();
      if (data.error) {
        setMessages((prev) => [...prev, { role: "assistant", content: `Error: ${data.error.message || "Unknown error"}` }]);
      } else {
        const text = data.content?.map((b) => b.type === "text" ? b.text : "").join("") || "No response.";
        setMessages((prev) => [...prev, { role: "assistant", content: text }]);
      }
    } catch (e) {
      setMessages((prev) => [...prev, { role: "assistant", content: "Connection error — check your API key and internet." }]);
    }
    setLoading(false);
  };

  if (!keyLoaded) return null;

  // Login screen
  if (!apiKey) {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 10, padding: "10px 0" }}>
        <div style={{ fontFamily: base.fontSerif, fontSize: 16, fontWeight: 600, color: theme.dark, textAlign: "center" }}>
          Sign in to Claude
        </div>
        <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, textAlign: "center", lineHeight: 1.5 }}>
          Enter your Anthropic API key to chat with Claude Opus 4.6
        </div>
        <input
          type="password"
          value={keyInput}
          onChange={(e) => setKeyInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") saveKey(); }}
          placeholder="sk-ant-api03-..."
          style={{
            fontFamily: base.fontSans, fontSize: 12, padding: "8px 10px",
            border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none",
          }}
        />
        <button onClick={saveKey} style={{
          fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, padding: "8px 16px",
          border: "none", background: theme.dark, color: theme.paper, cursor: "pointer",
          textTransform: "uppercase", letterSpacing: 0.5,
          opacity: keyInput.trim() ? 1 : 0.4,
        }}>
          Connect
        </button>
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.teal, textAlign: "center" }}>
          Get an API key →
        </a>
      </div>
    );
  }

  // Chat interface
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {/* Header with logout */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.teal }}>Connected</span>
        <button onClick={logout} style={{
          fontFamily: base.fontSans, fontSize: 9, color: theme.muted, background: "none",
          border: `1px solid ${theme.border}`, padding: "2px 8px", cursor: "pointer",
        }}>
          Logout
        </button>
      </div>
      {/* Messages */}
      <div style={{
        flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8,
        marginBottom: 10, minHeight: 200, maxHeight: "calc(100vh - 340px)",
      }}>
        {messages.length === 0 && (

/* ─── CALENDAR BOX ─── */
function CalendarBox() {
  const [events, setEvents, loaded] = usePersistedState("daily-brief:calendar", []);
  const [calUrl, setCalUrl, calUrlLoaded] = usePersistedState("daily-brief:calendar-url", "");
  const [urlInput, setUrlInput] = useState("");
  const [fetching, setFetching] = useState(false);
  const fileRef = useRef(null);

  const parseIcs = (text) => {
    const parsed = [];
    const blocks = text.split("BEGIN:VEVENT");
    for (let i = 1; i < blocks.length; i++) {
      const block = blocks[i].split("END:VEVENT")[0];
      const get = (key) => {
        const lines = block.split("\n");
        let val = "";
        for (let j = 0; j < lines.length; j++) {
          const line = lines[j].replace(/\r/g, "");
          if (line.startsWith(key + ":") || line.startsWith(key + ";")) {
            val = line.substring(line.indexOf(":") + 1);
            // Handle folded lines
            while (j + 1 < lines.length && /^[ \t]/.test(lines[j + 1])) {
              j++;
              val += lines[j].replace(/\r/g, "").substring(1);
            }
            break;
          }
        }
        return val.replace(/\\n/g, "\n").replace(/\\,/g, ",").replace(/\\\\/g, "\\").trim();
      };

      const parseDate = (raw) => {
        if (!raw) return null;
        // Handle YYYYMMDD or YYYYMMDDTHHmmssZ or YYYYMMDDTHHmmss
        const clean = raw.replace(/[^0-9T]/g, "");
        if (clean.length >= 8) {
          const y = clean.slice(0, 4), m = clean.slice(4, 6), d = clean.slice(6, 8);
          const h = clean.length >= 11 ? clean.slice(9, 11) : "00";
          const min = clean.length >= 13 ? clean.slice(11, 13) : "00";
          return new Date(`${y}-${m}-${d}T${h}:${min}:00`);
        }
        return null;
      };

      const summary = get("SUMMARY");
      const dtStart = parseDate(get("DTSTART"));
      const dtEnd = parseDate(get("DTEND"));
      const location = get("LOCATION");
      const description = get("DESCRIPTION");

      if (summary && dtStart) {
        parsed.push({ summary, start: dtStart.toISOString(), end: dtEnd ? dtEnd.toISOString() : null, location, description });
      }
    }
    return parsed.sort((a, b) => new Date(a.start) - new Date(b.start));
  };

  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    file.text().then((text) => {
      const parsed = parseIcs(text);
      if (parsed.length > 0) setEvents(parsed);
    });
    e.target.value = "";
  };

  const fetchFromUrl = async (url) => {
    if (!url) return;
    setFetching(true);
    const proxies = [
      (u) => u,
      (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
      (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    ];
    for (const proxy of proxies) {
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);
        const r = await fetch(proxy(url), { signal: controller.signal });
        clearTimeout(timer);
        if (r.ok) {
          const text = await r.text();
          const parsed = parseIcs(text);
          if (parsed.length > 0) { setEvents(parsed); setCalUrl(url); setFetching(false); return; }
        }
      } catch {}
    }
    setFetching(false);
  };

  // Auto-refresh from saved URL on load
  useEffect(() => {
    if (loaded && calUrlLoaded && calUrl) fetchFromUrl(calUrl);
  }, [loaded, calUrlLoaded]);

  if (!loaded) return null;

  const now = new Date();
  const upcoming = events.filter((ev) => new Date(ev.start) >= new Date(now.toISOString().slice(0, 10)));
  const past = events.filter((ev) => new Date(ev.start) < new Date(now.toISOString().slice(0, 10)));

  const formatDate = (iso) => {
    const d = new Date(iso);
    const today = new Date(); today.setHours(0,0,0,0);
    const tmrw = new Date(today); tmrw.setDate(tmrw.getDate() + 1);
    const evDay = new Date(d); evDay.setHours(0,0,0,0);
    let dayStr;
    if (evDay.getTime() === today.getTime()) dayStr = "Today";
    else if (evDay.getTime() === tmrw.getTime()) dayStr = "Tomorrow";
    else dayStr = d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
    const h = d.getHours(), m = d.getMinutes();
    if (h === 0 && m === 0) return dayStr;
    return `${dayStr}, ${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  };

  return (
    <Card title="Calendar">
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10, paddingBottom: 8, borderBottom: `1px solid ${theme.light}` }}>
        <div style={{ display: "flex", gap: 4 }}>
          <input value={urlInput} onChange={(e) => setUrlInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && urlInput.trim()) { fetchFromUrl(urlInput.trim()); setUrlInput(""); } }}
            placeholder=".ics link"
            style={{ flex: 1, fontFamily: base.fontSans, fontSize: 10, padding: "5px 6px", border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none", boxSizing: "border-box" }} />
          <button onClick={() => { if (urlInput.trim()) { fetchFromUrl(urlInput.trim()); setUrlInput(""); } }} style={{
            fontFamily: base.fontSans, fontSize: 9, padding: "3px 8px",
            border: `1px solid ${theme.border}`, background: theme.dark, color: theme.paper,
            cursor: "pointer", letterSpacing: 0.3, opacity: urlInput.trim() ? 1 : 0.4,
          }}>{fetching ? "…" : "Sync"}</button>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted }}>
            {events.length} event{events.length !== 1 ? "s" : ""}{calUrl ? " · linked" : ""}
          </span>
          <div style={{ display: "flex", gap: 4 }}>
            {calUrl && (
              <button onClick={() => fetchFromUrl(calUrl)} style={{
                fontFamily: base.fontSans, fontSize: 9, padding: "3px 6px",
                border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.teal,
                cursor: "pointer", letterSpacing: 0.3,
              }}>{fetching ? "…" : "↻"}</button>
            )}
            <input ref={fileRef} type="file" accept=".ics,.ical" style={{ display: "none" }} onChange={handleUpload} />
            <button onClick={() => fileRef.current?.click()} style={{
              fontFamily: base.fontSans, fontSize: 9, padding: "3px 8px",
              border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text,
              cursor: "pointer", letterSpacing: 0.3,
            }}>File</button>
          </div>
        </div>
      </div>

      {events.length === 0 ? (
        <div style={{ fontFamily: base.fontBody, fontSize: 12, color: theme.muted, fontStyle: "italic", textAlign: "center", padding: "10px 0" }}>
          Upload a .ics file to see your calendar.
        </div>
      ) : (
        <div style={{ maxHeight: 280, overflowY: "auto" }}>
          {upcoming.slice(0, 15).map((ev, i) => {
            const isToday = new Date(ev.start).toISOString().slice(0, 10) === now.toISOString().slice(0, 10);
            return (
              <div key={i} style={{
                padding: "6px 0", borderBottom: `1px solid ${theme.light}`,
                borderLeft: isToday ? `3px solid ${theme.crimson}` : "3px solid transparent",
                paddingLeft: 8,
              }}>
                <div style={{ fontFamily: base.fontSans, fontSize: 11, fontWeight: 500, color: theme.text, lineHeight: 1.3 }}>{ev.summary}</div>
                <div style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.teal, marginTop: 2 }}>{formatDate(ev.start)}</div>
                {ev.location && <div style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted, marginTop: 1 }}>{ev.location}</div>}
              </div>
            );
          })}
          {past.length > 0 && upcoming.length > 0 && (
            <div style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, padding: "8px 0 4px", borderBottom: `1px solid ${theme.light}` }}>Past</div>
          )}
          {past.slice(-5).reverse().map((ev, i) => (
            <div key={`p${i}`} style={{ padding: "5px 0 5px 8px", borderBottom: `1px solid ${theme.light}`, opacity: 0.5 }}>
              <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, lineHeight: 1.3 }}>{ev.summary}</div>
              <div style={{ fontFamily: base.fontSans, fontSize: 9, color: theme.muted }}>{formatDate(ev.start)}</div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

/* ─── HOME FEED (Google News Top Stories) ─── */
function HomeFeed() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    const rssUrl = HOME_FEED[0].rss;

    async function fetchNews() {
      // Try rss2json first (most reliable for Google News)
      try {
        const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
        const d = await r.json();
        if (!cancelled && d.status === "ok" && d.items?.length > 0) {
          setItems(d.items.slice(0, 25).map((item) => ({
            title: item.title || "", link: item.link || "", pubDate: item.pubDate || "",
            description: (item.description || "").replace(/<[^>]*>/g, "").slice(0, 140),
          })));
          setLoading(false);
          return;
        }
      } catch {}
      // Fallback: allorigins
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
        const json = await r.json();
        if (!cancelled && json.contents) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(json.contents, "text/xml");
          const entries = [...doc.querySelectorAll("item")];
          if (entries.length > 0) {
            setItems(entries.slice(0, 25).map((item) => ({
              title: item.querySelector("title")?.textContent?.trim() || "",
              link: item.querySelector("link")?.textContent?.trim() || "",
              pubDate: item.querySelector("pubDate")?.textContent?.trim() || "",
              description: (item.querySelector("description")?.textContent || "").replace(/<[^>]*>/g, "").slice(0, 140),
            })));
            setLoading(false);
            return;
          }
        }
      } catch {}
      // Fallback: corsproxy
      try {
        const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`);
        const xml = await r.text();
        if (!cancelled) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(xml, "text/xml");
          const entries = [...doc.querySelectorAll("item")];
          if (entries.length > 0) {
            setItems(entries.slice(0, 25).map((item) => ({
              title: item.querySelector("title")?.textContent?.trim() || "",
              link: item.querySelector("link")?.textContent?.trim() || "",
              pubDate: item.querySelector("pubDate")?.textContent?.trim() || "",
              description: (item.querySelector("description")?.textContent || "").replace(/<[^>]*>/g, "").slice(0, 140),
            })));
            setLoading(false);
            return;
          }
        }
      } catch {}
      if (!cancelled) setLoading(false);
    }

    fetchNews();
    const interval = setInterval(fetchNews, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 0, overflow: "hidden" }}>
      <div style={{ background: theme.paper, border: `1px solid ${theme.border}`, minHeight: 200, maxHeight: 600, overflowY: "auto" }}>
        {loading && items.length === 0 ? (
          <div style={{ padding: 20, textAlign: "center" }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 12, color: theme.muted, fontStyle: "italic" }}>Fetching headlines...</div>
          </div>
        ) : items.length === 0 ? (
          <div style={{ padding: 20, textAlign: "center", fontFamily: base.fontSans, fontSize: 12, color: theme.muted, fontStyle: "italic" }}>
            Could not load feed — try refreshing.
          </div>
        ) : (
          items.map((item, i) => (
            <a
              key={i}
              href={item.link}
              target="_blank"
              rel="noopener noreferrer"
              style={{
                display: "block", padding: "10px 14px",
                borderBottom: i < items.length - 1 ? `1px solid ${theme.light}` : "none",
                textDecoration: "none", transition: "background 0.15s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = theme.salmon; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
            >
              <div style={{
                fontFamily: base.fontBody, fontSize: 13, fontWeight: 400,
                color: theme.text, lineHeight: 1.35, marginBottom: 3,
                wordBreak: "break-word",
              }}>
                {item.title}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                {item.description && (
                  <div style={{
                    fontFamily: base.fontSans, fontSize: 11, color: theme.muted,
                    lineHeight: 1.3, flex: 1, marginRight: 8,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  }}>
                    {item.description}
                  </div>
                )}
                <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.teal, whiteSpace: "nowrap", flexShrink: 0 }}>
                  {timeAgo(item.pubDate)}
                </div>
              </div>
            </a>
          ))
        )}
      </div>
    </div>
  );
}

/* ─── Study Performance Graph ─── */
function StudyPerformance({ sessions, checks }) {
  const [chartType, setChartType] = useState("line");
  const [range, setRange] = useState("week"); // week | month | quarter
  const now = new Date();
  const todayKey = now.toISOString().slice(0, 10);

  const dayCount = range === "week" ? 7 : range === "month" ? 30 : 120;
  const days = [...Array(dayCount)].map((_, i) => {
    const d = new Date(now);
    d.setDate(d.getDate() - (dayCount - 1 - i));
    const key = d.toISOString().slice(0, 10);
    const daySessions = sessions.filter((s) => s.date === key);
    const bySubject = {};
    SUBJECTS.forEach((sub) => {
      bySubject[sub.id] = daySessions.filter((s) => s.subject === sub.id).reduce((a, s) => a + s.minutes, 0);
    });
    const total = daySessions.reduce((a, s) => a + s.minutes, 0);
    return {
      key,
      label: range === "week"
        ? d.toLocaleDateString("en-GB", { weekday: "short" })
        : d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }),
      bySubject,
      total,
      isToday: key === todayKey,
    };
  });

  // Adaptive Y axis — use actual max, with a small padding, minimum 10
  const rawMax = Math.max(...days.map((d) => d.total));
  const maxTotal = rawMax > 0 ? Math.ceil(rawMax * 1.15) : 10;

  // SVG dimensions
  const W = 420, H = 200, PAD = { top: 16, right: 16, bottom: 28, left: 34 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;
  const barW = plotW / days.length;

  const xPos = (i) => PAD.left + i * barW + barW / 2;
  const yPos = (v) => PAD.top + plotH - (v / maxTotal) * plotH;

  // Grid lines
  const gridSteps = 4;
  const gridLines = [...Array(gridSteps + 1)].map((_, i) => {
    const v = (maxTotal / gridSteps) * i;
    return { y: yPos(v), label: Math.round(v) + "m" };
  });

  // Subject totals for the period
  const periodTotals = {};
  SUBJECTS.forEach((sub) => {
    periodTotals[sub.id] = days.reduce((a, d) => a + d.bySubject[sub.id], 0);
  });
  const grandTotal = days.reduce((a, d) => a + d.total, 0);

  return (
    <Card title="Performance" style={{ height: "100%", boxSizing: "border-box" }}>
      {/* Chart type + range selectors */}
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 6 }}>
        <div style={{ display: "flex", gap: 3 }}>
          {[{ key: "line", label: "Line" }, { key: "bar", label: "Bar" }].map((t) => (
            <button key={t.key} onClick={() => setChartType(t.key)} style={{
              fontFamily: base.fontSans, fontSize: 10, fontWeight: chartType === t.key ? 600 : 400,
              padding: "4px 12px", cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.3,
              border: `1px solid ${chartType === t.key ? theme.dark : theme.border}`,
              background: chartType === t.key ? theme.dark : "transparent",
              color: chartType === t.key ? theme.paper : theme.muted,
            }}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 3 }}>
          {[{ key: "week", label: "7 Days" }, { key: "month", label: "30 Days" }, { key: "quarter", label: "4 Months" }].map((t) => (
            <button key={t.key} onClick={() => setRange(t.key)} style={{
              fontFamily: base.fontSans, fontSize: 10, fontWeight: range === t.key ? 600 : 400,
              padding: "4px 12px", cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.3,
              border: `1px solid ${range === t.key ? theme.dark : theme.border}`,
              background: range === t.key ? theme.dark : "transparent",
              color: range === t.key ? theme.paper : theme.muted,
            }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Chart SVG */}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
        {/* Grid */}
        {gridLines.map((g, i) => (
          <g key={i}>
            <line x1={PAD.left} y1={g.y} x2={W - PAD.right} y2={g.y} stroke={theme.light} strokeWidth={1} />
            <text x={PAD.left - 6} y={g.y + 3} textAnchor="end"
              style={{ fontSize: 8, fontFamily: base.fontSans, fill: theme.muted }}>{g.label}</text>
          </g>
        ))}

        {chartType === "bar" ? (
          /* ── Stacked Bar Chart ── */
          days.map((d, i) => {
            let cumY = yPos(0);
            return (
              <g key={d.key}>
                {SUBJECTS.map((sub) => {
                  const val = d.bySubject[sub.id];
                  if (val === 0) return null;
                  const h = (val / maxTotal) * plotH;
                  const y = cumY - h;
                  cumY = y;
                  return (
                    <rect key={sub.id} x={xPos(i) - barW * 0.35} y={y} width={barW * 0.7} height={h}
                      fill={sub.color} opacity={d.isToday ? 1 : 0.7} rx={1}>
                      <title>{sub.label}: {val}m</title>
                    </rect>
                  );
                })}
                {/* X label */}
                {(range === "week" || i % Math.ceil(dayCount / 8) === 0 || i === dayCount - 1) && (
                  <text x={xPos(i)} y={H - 6} textAnchor="middle"
                    style={{ fontSize: range === "week" ? 9 : range === "month" ? 7 : 6, fontFamily: base.fontSans, fill: d.isToday ? theme.dark : theme.muted, fontWeight: d.isToday ? 600 : 400 }}>
                    {d.label}
                  </text>
                )}
              </g>
            );
          })
        ) : (
          /* ── Line Chart (one line per subject) ── */
          SUBJECTS.map((sub) => {
            const points = days.map((d, i) => ({ x: xPos(i), y: yPos(d.bySubject[sub.id]), val: d.bySubject[sub.id] }));
            const nonZero = points.filter((p) => p.val > 0);
            if (nonZero.length === 0) return null;
            const path = nonZero.map((p, j) => `${j === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
            return (
              <g key={sub.id}>
                <path d={path} fill="none" stroke={sub.color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={0.8} />
                {nonZero.map((p, j) => (
                  <circle key={j} cx={p.x} cy={p.y} r={3} fill={sub.color} stroke={theme.paper} strokeWidth={1.5}>
                    <title>{sub.label}: {p.val}m</title>
                  </circle>
                ))}
              </g>
            );
          })
        )}

        {/* X labels for line chart */}
        {chartType === "line" && days.map((d, i) => (
          (range === "week" || i % Math.ceil(dayCount / 8) === 0 || i === dayCount - 1) ? (
            <text key={d.key} x={xPos(i)} y={H - 6} textAnchor="middle"
              style={{ fontSize: range === "week" ? 9 : range === "month" ? 7 : 6, fontFamily: base.fontSans, fill: d.isToday ? theme.dark : theme.muted, fontWeight: d.isToday ? 600 : 400 }}>
              {d.label}
            </text>
          ) : null
        ))}
      </svg>

      {/* Subject legend + totals */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10, paddingTop: 10, borderTop: `1px solid ${theme.light}` }}>
        {SUBJECTS.map((sub) => (
          <div key={sub.id} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: sub.color, display: "inline-block" }} />
            <span style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.text }}>{sub.label}</span>
            <span style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted }}>
              {Math.floor(periodTotals[sub.id] / 60)}h{periodTotals[sub.id] % 60}m
            </span>
          </div>
        ))}
      </div>
      <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, marginTop: 6 }}>
        Total: {Math.floor(grandTotal / 60)}h {grandTotal % 60}m over {range === "week" ? "7" : range === "month" ? "30" : "120"} days
      </div>

      {/* ── Progress (checkoff completion) ── */}
      {checks && (() => {
        const data = CHECKOFF_SUBJECTS.map((sub) => {
          const { cols, rows } = getCheckoffConfig(sub.id);
          const total = cols.length * rows.length;
          let done = 0;
          rows.forEach((r) => cols.forEach((c) => {
            if (checks[`${sub.id}:${r}:${c}`]) done++;
          }));
          return { ...sub, total, done, pct: total > 0 ? (done / total) * 100 : 0 };
        });
        const overallPct = Math.round(data.reduce((a, d) => a + d.done, 0) / Math.max(1, data.reduce((a, d) => a + d.total, 0)) * 100);
        return (
          <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${theme.light}` }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
              Progress — {overallPct}%
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {data.map((d) => (
                <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontFamily: base.fontSans, fontSize: 9, fontWeight: 600, color: d.color, width: 32, flexShrink: 0 }}>{d.label}</span>
                  <div style={{
                    flex: 1, height: 12, background: theme.light, borderRadius: 2,
                    position: "relative", overflow: "hidden", border: `1px solid ${theme.border}`,
                  }}>
                    <div style={{
                      position: "absolute", top: 0, left: 0, bottom: 0,
                      width: `${d.pct}%`, background: d.color,
                      borderRadius: "1px 0 0 1px", transition: "width 0.4s ease",
                      opacity: 0.85,
                    }} />
                  </div>
                  <span style={{ fontFamily: base.fontSans, fontSize: 8, color: theme.muted, width: 32, flexShrink: 0, textAlign: "right" }}>{d.done}/{d.total}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </Card>
  );
}

/* ─── Study Heatmap ─── */
function StudyHeatmap({ sessions }) {
  // Hours from 4am (4) to 3am next day (27), displayed as 4,5,...,23,0,1,2,3
  const hours = [];
  for (let i = 4; i < 28; i++) hours.push(i % 24);

  // For each session, compute which hour(s) it occupies
  // time is "HH:MM" (end time), minutes is duration
  const hourTotals = {};
  hours.forEach((h) => { hourTotals[h] = { total: 0, days: new Set() }; });

  sessions.forEach((s) => {
    if (!s.time || !s.minutes) return;
    const [endH, endM] = s.time.split(":").map(Number);
    const endMins = endH * 60 + endM;
    const startMins = endMins - s.minutes;
    // Distribute minutes across hours
    for (let m = startMins; m < endMins; m++) {
      let hour = Math.floor(((m % 1440) + 1440) % 1440 / 60);
      if (hourTotals[hour] !== undefined) {
        hourTotals[hour].total += 1; // 1 minute
        hourTotals[hour].days.add(s.date);
      }
    }
  });

  // Get all unique days that have any session
  const allDays = new Set(sessions.map((s) => s.date));
  const dayCount = Math.max(allDays.size, 1);

  // Compute average minutes per hour
  const hourAvgs = hours.map((h) => ({
    hour: h,
    avg: hourTotals[h].total / dayCount,
  }));

  const maxAvg = Math.max(...hourAvgs.map((h) => h.avg), 1);

  const formatHour = (h) => {
    if (h === 0) return "12am";
    if (h < 12) return `${h}am`;
    if (h === 12) return "12pm";
    return `${h - 12}pm`;
  };

  return (
    <Card title="Heatmap" style={{ minWidth: 56, padding: "14px 10px", display: "flex", flexDirection: "column", flex: 1, width: "100%", height: "100%", boxSizing: "border-box" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 0, flex: 1 }}>
        {hourAvgs.map(({ hour, avg }) => {
          const intensity = avg / maxAvg;
          const r = Math.round(91 + (139 - 91) * (1 - intensity));
          const g = Math.round(58 + (179 - 58) * (1 - intensity));
          const b = Math.round(50 + (154 - 50) * (1 - intensity));
          const bg = avg > 0 ? `rgb(${r}, ${g}, ${b})` : theme.light;
          return (
            <div key={hour} style={{ display: "flex", alignItems: "stretch", flex: 1, gap: 3 }}>
              <span style={{
                fontFamily: base.fontSans, fontSize: 7, color: theme.muted,
                width: 14, textAlign: "right", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "flex-end",
              }}>
                {String(hour).padStart(2, "0")}
              </span>
              <div
                style={{
                  flex: 1, background: bg, borderRadius: 1,
                  minHeight: 0, margin: "0.5px 0",
                }}
                title={`${formatHour(hour)}: ${Math.round(avg)} min avg`}
              />
            </div>
          );
        })}
      </div>
      <div style={{ fontFamily: base.fontSans, fontSize: 7, color: theme.muted, marginTop: 4, textAlign: "center" }}>
        {dayCount}d avg
      </div>
    </Card>
  );
}

/* ─── Study Check-off ─── */
const CHECKOFF_SUBJECTS = [
  { id: "RE01", label: "RE01", color: "#4A6FA5" },
  { id: "RE02", label: "RE02", color: "#C9A227" },
  { id: "RE03", label: "RE03", color: "#A84032" },

function getCheckoffConfig(subId) {
  const baseCols = ["LT1", "LT2", "LT3", "LT4", "LT5", "LT6", "LT8"];
  const baseRows = ["Overview", "Lecture", "Readings", "Recall"];
  let cols = [...baseCols];
  let rows = [...baseRows];
  if (subId === "RE01" || subId === "RE02") cols = [...baseCols, "S1", "S2"];
  if (subId === "RE03") rows = ["Overview", "LA", "LB", "LC", "Lecture", "Readings", "Recall"];
  return { cols, rows };
}

function StudyCheckoff({ checks, setChecks }) {
  const [tab, setTab] = useState("RE01");

  const { cols, rows } = getCheckoffConfig(tab);
  const sub = CHECKOFF_SUBJECTS.find((s) => s.id === tab);

  const toggleCheck = (row, col) => {
    const key = `${tab}:${row}:${col}`;
    setChecks((prev) => ({ ...prev, [key]: !prev[key] }));
  };

  const isChecked = (row, col) => !!checks[`${tab}:${row}:${col}`];

  // Progress
  const total = cols.length * rows.length;
  const done = rows.reduce((a, r) => a + cols.reduce((b, c) => b + (isChecked(r, c) ? 1 : 0), 0), 0);

  return (
    <Card title="Check-off">
      {/* Subject tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>

          <button key={s.id} onClick={() => setTab(s.id)} style={{

            background: tab === s.id ? s.color : "transparent",
            color: tab === s.id ? theme.paper : theme.text,
            borderRadius: 2, textTransform: "uppercase", letterSpacing: 0.5,
          }}>
            {s.label}
          </button>
        ))}
        <span style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, marginLeft: "auto", alignSelf: "center" }}>
          {done}/{total}
        </span>
      </div>

      {/* Grid */}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: base.fontSans, fontSize: 11 }}>
          <thead>
            <tr>
              <th style={{
                textAlign: "left", padding: "6px 10px", borderBottom: `2px solid ${sub.color}`,
                color: theme.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5,

                }}>

                </th>
              ))}
            </tr>
          </thead>

            {rows.map((row, ri) => (
              <tr key={row} style={{ background: ri % 2 === 0 ? "transparent" : theme.salmon }}>
                <td style={{
                  padding: "7px 10px", fontWeight: 500, color: theme.text, fontSize: 11,
                  borderBottom: `1px solid ${theme.light}`,
                  position: "sticky", left: 0, background: ri % 2 === 0 ? theme.paper : theme.salmon,
                  textTransform: "capitalize",
                }}>
                  {row}
                </td>
                {cols.map((col) => (
                  <td key={col} style={{
                    textAlign: "center", padding: "5px 4px",

                      style={{

                        border: isChecked(row, col) ? `2px solid ${sub.color}` : `1.5px solid ${theme.border}`,
                        background: isChecked(row, col) ? sub.color : "transparent",
                        color: theme.paper, fontSize: 12, fontWeight: 700,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        margin: "0 auto", transition: "all 0.1s",
                      }}
                    >
                      {isChecked(row, col) ? "✓" : ""}
                    </button>
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

function StudyPage({ sessions, setSessions }) {
  const [timerMode, setTimerMode] = useState("pomodoro");
  const [studyDur, setStudyDur] = useState(25);
  const [breakDur, setBreakDur] = useState(5);
  const [phase, setPhase] = useState("idle");
  const [timeLeft, setTimeLeft] = useState(25 * 60);
  const [studiedSecs, setStudiedSecs] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [checks, setChecks] = usePersistedState("daily-brief:checkoff", {});
  const [swRunning, setSwRunning] = useState(false);
  const [subject, setSubject] = useState(null);
  const [customMin, setCustomMin] = useState("");
  const timerRef = useRef(null);
  const stateRef = useRef({ phase, timeLeft, studiedSecs: 0, elapsed, swRunning });
  const todayKey = new Date().toISOString().slice(0, 10);

  const STUDY_OPTS = [5, 15, 25, 45];
  const BREAK_OPTS = [5, 10, 20];

  // Keep ref in sync
  useEffect(() => {
    stateRef.current = { ...stateRef.current, phase, timeLeft, elapsed, swRunning };
  });

  // Single tick function
  const logSession = useCallback((secs) => {
    if (!subject || secs < 1) return;
    const mins = Math.max(1, Math.round(secs / 60));
    setSessions((prev) => [...prev, {
      id: Date.now(), date: new Date().toISOString().slice(0, 10),
      minutes: mins, subject,
      time: new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }),
    }]);
  }, [subject, setSessions]);

  // Master tick
  useEffect(() => {
    clearInterval(timerRef.current);

    const shouldTick =
      (timerMode === "pomodoro" && (phase === "studying" || phase === "breaking")) ||
      (timerMode === "stopwatch" && swRunning);

    if (!shouldTick) return;

    timerRef.current = setInterval(() => {
      const s = stateRef.current;

      if (timerMode === "pomodoro") {
        if (s.timeLeft <= 1) {
          // Timer finished
          if (s.phase === "studying") {
            const studied = s.studiedSecs + 1;
            logSession(studied);
            stateRef.current.studiedSecs = 0;
            setStudiedSecs(0);
            setPhase("breaking");
            setTimeLeft(breakDur * 60);
          } else if (s.phase === "breaking") {
            setPhase("prompt");
            setTimeLeft(0);
          }
        } else {
          const newTime = s.timeLeft - 1;
          setTimeLeft(newTime);
          if (s.phase === "studying") {
            stateRef.current.studiedSecs += 1;
            setStudiedSecs(stateRef.current.studiedSecs);
          }
        }
      } else if (timerMode === "stopwatch") {
        setElapsed((e) => e + 1);
      }
    }, 1000);

    return () => clearInterval(timerRef.current);
  }, [phase, timerMode, swRunning, breakDur, logSession]);

  // Actions
  const switchTimerMode = (m) => {
    if (phase !== "idle" && phase !== "prompt") return;
    if (swRunning) return;
    setTimerMode(m); setPhase("idle"); setTimeLeft(studyDur * 60); setElapsed(0);
    stateRef.current.studiedSecs = 0; setStudiedSecs(0);
  };
  const startPomodoro = () => {
    if (!subject) return;
    stateRef.current.studiedSecs = 0; setStudiedSecs(0);
    setTimeLeft(studyDur * 60); setPhase("studying");
  };
  const pausePomodoro = () => setPhase((p) => p === "studying" ? "paused_study" : p === "breaking" ? "paused_break" : p);
  const resumePomodoro = () => setPhase((p) => p === "paused_study" ? "studying" : p === "paused_break" ? "breaking" : p);
  const stopAndLog = () => {
    logSession(stateRef.current.studiedSecs);
    stateRef.current.studiedSecs = 0; setStudiedSecs(0);
    setPhase("idle"); setTimeLeft(studyDur * 60);
  };
  const endBreakEarly = () => setPhase("prompt");
  const startNextCycle = () => {
    stateRef.current.studiedSecs = 0; setStudiedSecs(0);
    setTimeLeft(studyDur * 60); setPhase("studying");
  };
  const finishSession = () => {
    stateRef.current.studiedSecs = 0; setStudiedSecs(0);
    setPhase("idle"); setTimeLeft(studyDur * 60);
  };
  const logStopwatch = () => {
    if (elapsed < 1 || !subject) return;
    logSession(elapsed);
    setSwRunning(false); setElapsed(0);
  };
  const setCustom = () => {
    const m = parseInt(customMin);
    if (m > 0 && m <= 120) { setStudyDur(m); setTimeLeft(m * 60); setCustomMin(""); }
  };

  const isActive = phase === "studying" || phase === "breaking";
  const isPaused = phase === "paused_study" || phase === "paused_break";
  const isStudying = phase === "studying" || phase === "paused_study";
  const isBreaking = phase === "breaking" || phase === "paused_break";
  const locked = phase !== "idle" && phase !== "prompt";

  const displaySecs = timerMode === "pomodoro" ? timeLeft : elapsed;
  const displayMins = Math.floor(displaySecs / 60);
  const displaySecsRem = displaySecs % 60;
  const displayHrs = Math.floor(displayMins / 60);
  const showHrs = displayHrs > 0;
  const totalDur = isBreaking ? breakDur * 60 : studyDur * 60;
  const circumference = 2 * Math.PI * 78;
  const progress = timerMode === "pomodoro" ? ((phase === "idle" || phase === "prompt") ? 0 : 1 - timeLeft / totalDur) : (elapsed % (25 * 60)) / (25 * 60);
  const activeColor = isBreaking ? theme.teal : (subject ? subjectColor(subject) : theme.teal);

  return (
    <div style={{ padding: 20, display: "grid", gridTemplateColumns: "2fr 2fr 1fr", gap: 16, alignItems: "start" }}>
      <Card accent style={{ gridRow: "1 / 3" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
          {/* Mode toggle */}
          <div style={{ display: "flex", width: "100%", borderBottom: `1px solid ${theme.light}`, paddingBottom: 10 }}>
            {[{ key: "pomodoro", label: "Pomodoro" }, { key: "stopwatch", label: "Stopwatch" }].map((t) => (
              <button key={t.key} onClick={() => switchTimerMode(t.key)} style={{
                flex: 1, fontFamily: base.fontSans, fontSize: 12, fontWeight: timerMode === t.key ? 600 : 400,
                padding: "8px 12px", cursor: locked ? "default" : "pointer",
                border: "none", borderBottom: timerMode === t.key ? `3px solid ${theme.crimson}` : "3px solid transparent",
                background: "transparent", color: timerMode === t.key ? theme.dark : theme.muted,
                textTransform: "uppercase", letterSpacing: 0.5, opacity: locked && timerMode !== t.key ? 0.4 : 1,
              }}>{t.label}</button>
            ))}
          </div>

          {/* Subject */}
          <div style={{ width: "100%" }}>
            <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Subject <span style={{ color: theme.crimson }}>*</span></div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {SUBJECTS.map((sub) => (
                <button key={sub.id} onClick={() => { if (!locked) setSubject(sub.id); }} style={{
                  fontFamily: base.fontSans, fontSize: 11, fontWeight: subject === sub.id ? 600 : 400,
                  padding: "5px 12px", cursor: locked ? "default" : "pointer",
                  border: subject === sub.id ? `2px solid ${sub.color}` : `1px solid ${theme.border}`,
                  background: subject === sub.id ? sub.color : "transparent",
                  color: subject === sub.id ? theme.paper : theme.text,
                  borderRadius: 2, opacity: locked && subject !== sub.id ? 0.3 : 1,
                }}>{sub.label}</button>
              ))}
            </div>
          </div>

          {/* Timer ring */}
          <div style={{ position: "relative", width: 160, height: 160 }}>
            <svg width="160" height="160" viewBox="0 0 160 160">
              <circle cx="80" cy="80" r="65" fill="none" stroke={theme.wheat} strokeWidth="5" />
              <circle cx="80" cy="80" r="65" fill="none" stroke={activeColor} strokeWidth="5"
                strokeDasharray={2 * Math.PI * 65} strokeDashoffset={(2 * Math.PI * 65) * (1 - progress)}
                strokeLinecap="round" transform="rotate(-90 80 80)" style={{ transition: "stroke-dashoffset 0.5s" }} />
            </svg>
            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }}>
              <div style={{ fontFamily: base.fontSerif, fontSize: showHrs ? 26 : 32, fontWeight: 700, color: theme.dark, lineHeight: 1 }}>
                {showHrs && `${String(displayHrs).padStart(2, "0")}:`}{String(showHrs ? displayMins % 60 : displayMins).padStart(2, "0")}:{String(displaySecsRem).padStart(2, "0")}
              </div>
              <div style={{ fontFamily: base.fontSans, fontSize: 10, color: isBreaking ? theme.teal : (subject ? subjectColor(subject) : theme.muted), textTransform: "uppercase", letterSpacing: 1, marginTop: 4, fontWeight: 600 }}>
                {timerMode === "stopwatch" ? (subject ? subjectLabel(subject) : "Stopwatch")
                  : phase === "prompt" ? "Done!" : isBreaking ? "Break" : isPaused ? "Paused"
                  : isActive ? (subject ? subjectLabel(subject) : "Focus") : "Ready"}
              </div>
            </div>
          </div>

          {/* ── Pomodoro Controls ── */}
          {timerMode === "pomodoro" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%", alignItems: "center" }}>
              {phase === "prompt" && (
                <div style={{ textAlign: "center", padding: "8px 0" }}>
                  <div style={{ fontFamily: base.fontSerif, fontSize: 16, fontWeight: 600, color: theme.dark, marginBottom: 12 }}>Break’s over — keep going?</div>
                  <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                    <button onClick={startNextCycle} style={{ fontFamily: base.fontSans, fontSize: 12, fontWeight: 600, padding: "10px 22px", border: "none", background: activeColor, color: theme.paper, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5 }}>Next Session</button>
                    <button onClick={finishSession} style={{ fontFamily: base.fontSans, fontSize: 12, fontWeight: 500, padding: "10px 22px", border: `1px solid ${theme.border}`, background: "transparent", color: theme.text, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5 }}>Finish</button>
                  </div>
                </div>
              )}
              {phase === "idle" && (
                <>
                  <div style={{ width: "100%" }}>
                    <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 5 }}>Study</div>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {STUDY_OPTS.map((m) => (
                        <button key={m} onClick={() => { setStudyDur(m); setTimeLeft(m * 60); }} style={{
                          fontFamily: base.fontSans, fontSize: 11, fontWeight: studyDur === m ? 600 : 400,
                          padding: "6px 14px", border: `1px solid ${studyDur === m ? theme.dark : theme.border}`,
                          background: studyDur === m ? theme.dark : "transparent", color: studyDur === m ? theme.paper : theme.text,
                          cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5,
                        }}>{m} min</button>
                      ))}
                    </div>
                  </div>
                  <div style={{ width: "100%" }}>
                    <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 5 }}>Break</div>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {BREAK_OPTS.map((m) => (
                        <button key={m} onClick={() => setBreakDur(m)} style={{
                          fontFamily: base.fontSans, fontSize: 11, fontWeight: breakDur === m ? 600 : 400,
                          padding: "6px 14px", border: `1px solid ${breakDur === m ? theme.teal : theme.border}`,
                          background: breakDur === m ? theme.teal : "transparent", color: breakDur === m ? theme.paper : theme.text,
                          cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5,
                        }}>{m} min</button>
                      ))}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <input type="number" placeholder="Custom study" value={customMin} onChange={(e) => setCustomMin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && setCustom()}
                      style={{ fontFamily: base.fontSans, fontSize: 12, padding: "6px 10px", width: 110, border: `1px solid ${theme.border}`, background: theme.salmon, color: theme.text, outline: "none" }} />
                    <button onClick={setCustom} style={{ fontFamily: base.fontSans, fontSize: 11, padding: "6px 10px", border: `1px solid ${theme.border}`, background: "transparent", cursor: "pointer", color: theme.text }}>Set</button>
                  </div>
                  <button onClick={startPomodoro} style={{
                    fontFamily: base.fontSans, fontSize: 13, fontWeight: 600, padding: "10px 32px", border: "none",
                    cursor: !subject ? "not-allowed" : "pointer", background: !subject ? theme.border : activeColor,
                    color: theme.paper, letterSpacing: 1, textTransform: "uppercase",
                  }}>Start</button>
                  {!subject && <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.crimson, fontStyle: "italic" }}>Select a subject to start</div>}
                </>
              )}
              {(isActive || isPaused) && phase !== "prompt" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "center" }}>
                  <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, marginBottom: 2 }}>
                    {isStudying ? `Studying ${studyDur} min` : `Break ${breakDur} min`}{isPaused && " · Paused"}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={isPaused ? resumePomodoro : pausePomodoro} style={{
                      fontFamily: base.fontSans, fontSize: 12, fontWeight: 600, padding: "8px 22px", border: "none",
                      background: isPaused ? activeColor : theme.crimson, color: theme.paper, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5,
                    }}>{isPaused ? "Resume" : "Pause"}</button>
                    {isStudying && <button onClick={stopAndLog} style={{
                      fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, padding: "8px 16px",
                      border: `1px solid ${theme.dark}`, background: "transparent", color: theme.text, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5,
                    }}>Stop & Log</button>}
                    {isBreaking && <button onClick={endBreakEarly} style={{
                      fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, padding: "8px 16px",
                      border: `1px solid ${theme.teal}`, background: "transparent", color: theme.teal, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5,
                    }}>End Break</button>}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── Stopwatch Controls ── */}
          {timerMode === "stopwatch" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%", alignItems: "center" }}>
              {elapsed > 0 && !swRunning && <div style={{ fontFamily: base.fontSans, fontSize: 12, color: theme.muted }}>{Math.round(elapsed / 60)} min will be logged</div>}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => { if (!subject) return; setSwRunning(!swRunning); }} style={{
                  fontFamily: base.fontSans, fontSize: 13, fontWeight: 600, padding: "10px 28px", border: "none",
                  cursor: !subject ? "not-allowed" : "pointer", background: !subject ? theme.border : (swRunning ? theme.crimson : activeColor),
                  color: theme.paper, letterSpacing: 1, textTransform: "uppercase",
                }}>{swRunning ? "Pause" : elapsed > 0 ? "Resume" : "Start"}</button>
                <button onClick={logStopwatch} style={{
                  fontFamily: base.fontSans, fontSize: 11, fontWeight: 600, padding: "6px 14px",
                  border: `1px solid ${elapsed > 0 && subject ? theme.teal : theme.border}`,
                  background: elapsed > 0 && subject ? theme.teal : "transparent",
                  color: elapsed > 0 && subject ? theme.paper : theme.muted,
                  cursor: elapsed > 0 && subject ? "pointer" : "not-allowed", textTransform: "uppercase", letterSpacing: 0.5,
                }}>Log & Reset</button>
              </div>
              {!subject && <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.crimson, fontStyle: "italic" }}>Select a subject to start</div>}
            </div>
          )}
        </div>
      </Card>

      {/* ── Performance (column 2, row 1) ── */}
      <div style={{ alignSelf: "stretch", display: "flex" }}>
        <div style={{ flex: 1 }}><StudyPerformance sessions={sessions} checks={checks} /></div>
      </div>

      {/* ── Heatmap (column 3, row 1) ── */}
      <div style={{ alignSelf: "stretch", display: "flex" }}>
        <StudyHeatmap sessions={sessions} />
      </div>

      {/* ── Check-off (columns 2-3, row 2) ── */}
      <div style={{ gridColumn: "2 / 4" }}>
        <StudyCheckoff checks={checks} setChecks={setChecks} />
      </div>
    </div>
  );
}

function Broadstream() {
  const [activeChannel, setActiveChannel] = useState(BROADCAST_CHANNELS[0]);
  const [radioPlaying, setRadioPlaying] = useState(null);
  const [volume, setVolume] = useState(0.7);
  const audioRef = useRef(null);

  const playRadio = (station) => {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    if (radioPlaying?.name === station.name) { setRadioPlaying(null); return; }
    const a = new Audio(station.url);
    a.volume = volume;
    a.play().catch(() => {});
    audioRef.current = a;
    setRadioPlaying(station);
  };

  useEffect(() => { if (audioRef.current) audioRef.current.volume = volume; }, [volume]);

  return (
    <Card title="Broadstream" accent>
      <div style={{ marginBottom: 12 }}>
        <div style={{ position: "relative", width: "100%", paddingBottom: "62%", background: theme.dark, marginBottom: 10, border: `1px solid ${theme.border}` }}>

            src={`https://www.youtube.com/embed/${activeChannel.yt}?autoplay=1&controls=1&mute=0`}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowFullScreen
            referrerPolicy="strict-origin-when-cross-origin"
            style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", border: "none" }}
          />
        </div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {BROADCAST_CHANNELS.map((ch) => (
            <button key={ch.name} onClick={() => setActiveChannel(ch)} style={{
              padding: "5px 10px", cursor: "pointer",
              border: activeChannel?.name === ch.name ? `2px solid ${theme.crimson}` : `1px solid ${theme.border}`,
              background: activeChannel?.name === ch.name ? theme.dark : theme.paper,
              color: activeChannel?.name === ch.name ? theme.paper : theme.text,
              fontFamily: base.fontSans, fontSize: 10, fontWeight: activeChannel?.name === ch.name ? 600 : 400,
              borderRadius: 2,
            }}>{ch.name}</button>
          ))}
        </div>
      </div>
      <div>
        <div style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Radio</div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
          {RADIO_STATIONS.map((s) => (
            <button key={s.name} onClick={() => playRadio(s)} style={{
              padding: "5px 10px", cursor: "pointer",
              border: radioPlaying?.name === s.name ? `2px solid ${theme.crimson}` : `1px solid ${theme.border}`,
              background: radioPlaying?.name === s.name ? theme.light : theme.paper,
              fontFamily: base.fontSans, fontSize: 10, color: theme.text,
              fontWeight: radioPlaying?.name === s.name ? 600 : 400, borderRadius: 2,
            }}>
              {s.name}
              {radioPlaying?.name === s.name && <span style={{ fontSize: 8, color: theme.crimson, fontWeight: 700, marginLeft: 4 }}>■</span>}
            </button>
          ))}
          {radioPlaying && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: "auto" }}>
              <span style={{ fontFamily: base.fontSans, fontSize: 10, color: theme.muted }}>Vol</span>
              <input type="range" min="0" max="1" step="0.05" value={volume} onChange={(e) => setVolume(parseFloat(e.target.value))} style={{ width: 60, accentColor: theme.crimson }} />
            </div>
          )}
        </div>
      </div>
    </Card>
  );
}

/* ─── Energy Line Graph ─── */
function EnergyGraph({ entries }) {
  const [range, setRange] = useState("today");

  const now = new Date();
  const todayKey = now.toISOString().slice(0, 10);

  const getDataPoints = () => {
    const withEnergy = entries.filter((e) => e.energy);
    if (range === "today") {
      return withEnergy
        .filter((e) => e.date.slice(0, 10) === todayKey)
        .map((e) => ({
          time: new Date(e.date).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }),
          energy: e.energy,
          sortKey: new Date(e.date).getTime(),
        }))
        .sort((a, b) => a.sortKey - b.sortKey);
    } else if (range === "week") {
      // Group by day for last 7 days
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const dayEntries = withEnergy.filter((e) => e.date.slice(0, 10) === key);
        if (dayEntries.length > 0) {
          const avg = dayEntries.reduce((a, e) => a + e.energy, 0) / dayEntries.length;
          days.push({
            time: d.toLocaleDateString("en-GB", { weekday: "short" }),
            energy: Math.round(avg * 10) / 10,
            sortKey: d.getTime(),
          });
        }
      }
      return days;
    } else {
      // Group by day for last 30 days
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const dayEntries = withEnergy.filter((e) => e.date.slice(0, 10) === key);
        if (dayEntries.length > 0) {
          const avg = dayEntries.reduce((a, e) => a + e.energy, 0) / dayEntries.length;
          days.push({
            time: d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }),
            energy: Math.round(avg * 10) / 10,
            sortKey: d.getTime(),
          });
        }
      }
      return days;
    }
  };

  const data = getDataPoints();
  const tabs = [
    { key: "today", label: "Today" },
    { key: "week", label: "This Week" },
    { key: "month", label: "This Month" },
  ];

  // SVG line graph
  const W = 268, H = 120, PAD = { top: 14, right: 10, bottom: 22, left: 24 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const xScale = (i) => PAD.left + (data.length > 1 ? (i / (data.length - 1)) * plotW : plotW / 2);
  const yScale = (v) => PAD.top + plotH - ((v - 1) / 4) * plotH;

  const linePath = data.map((d, i) => `${i === 0 ? "M" : "L"}${xScale(i).toFixed(1)},${yScale(d.energy).toFixed(1)}`).join(" ");
  const areaPath = data.length > 1
    ? linePath + ` L${xScale(data.length - 1).toFixed(1)},${yScale(1).toFixed(1)} L${xScale(0).toFixed(1)},${yScale(1).toFixed(1)} Z`
    : "";

  return (
    <Card title="Energy Level">
      {/* Range tabs */}
      <div style={{ display: "flex", gap: 3, marginBottom: 10 }}>
        {tabs.map((t) => (
          <button
            key={t.key}
            onClick={() => setRange(t.key)}
            style={{
              flex: 1, fontFamily: base.fontSans, fontSize: 9, fontWeight: range === t.key ? 600 : 400,
              padding: "4px 6px", cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.3,
              border: `1px solid ${range === t.key ? theme.dark : theme.border}`,
              background: range === t.key ? theme.dark : "transparent",
              color: range === t.key ? theme.paper : theme.muted,
            }}
          >
            {t.label}
          </button>
        ))}
      </div>

      {data.length === 0 ? (
        <div style={{ height: H, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted, fontStyle: "italic" }}>
            No energy data for this period
          </span>
        </div>
      ) : (
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
          {/* Y-axis grid lines and labels */}
          {[1, 2, 3, 4, 5].map((v) => (
            <g key={v}>
              <line x1={PAD.left} y1={yScale(v)} x2={W - PAD.right} y2={yScale(v)} stroke={theme.light} strokeWidth={1} />
              <text x={PAD.left - 6} y={yScale(v) + 3} textAnchor="end"
                style={{ fontSize: 8, fontFamily: base.fontSans, fill: theme.muted }}>
                {v}
              </text>
            </g>
          ))}
          {/* Area fill */}
          <path d={areaPath} fill={theme.teal} opacity={0.08} />
          {/* Line */}
          <path d={linePath} fill="none" stroke={theme.teal} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
          {/* Data points */}
          {data.map((d, i) => (
            <g key={i}>
              <circle cx={xScale(i)} cy={yScale(d.energy)} r={3.5} fill={energyColor(Math.round(d.energy))} stroke={theme.paper} strokeWidth={1.5} />
              {/* X labels - show first, last, and middle for readability */}
              {(i === 0 || i === data.length - 1 || (data.length > 4 && i === Math.floor(data.length / 2))) && (
                <text x={xScale(i)} y={H - 4} textAnchor="middle"
                  style={{ fontSize: 7, fontFamily: base.fontSans, fill: theme.muted }}>
                  {d.time}
                </text>
              )}
            </g>
          ))}
        </svg>
      )}
    </Card>
  );
}

/* ─── JOURNAL PAGE ─── */
function JournalPage({ entries, setEntries, writedowns, setWritedowns, wisdom }) {
  const [body, setBody] = useState("");

  const [energy, setEnergy] = useState(3);
  const [filterTag, setFilterTag] = useState("all");
  const [selectedId, setSelectedId] = useState(null);
  const [images, setImages] = useState([]);
  const [quoteSeed] = useState(() => Math.random()); // random on load, stable across renders
  const fileRef = useRef(null);
  const textRef = useRef(null);

  const allTags = [...new Set(entries.flatMap((e) => e.tags))].sort();

  const readFileAsBase64 = (file) =>
    new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(file);
    });

  const handleFiles = async (files) => {
    const imgFiles = [...files].filter((f) => f.type.startsWith("image/"));
    const results = await Promise.all(imgFiles.map(readFileAsBase64));
    setImages((prev) => [...prev, ...results]);
  };

  const handlePaste = async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    const imgItems = [...items].filter((i) => i.type.startsWith("image/"));
    if (imgItems.length === 0) return;
    e.preventDefault();
    const files = imgItems.map((i) => i.getAsFile()).filter(Boolean);
    await handleFiles(files);
  };

  const handleDrop = async (e) => {
    e.preventDefault();
    e.currentTarget.style.borderColor = theme.border;
    if (e.dataTransfer?.files) await handleFiles(e.dataTransfer.files);
  };

  const removeImage = (idx) => setImages((prev) => prev.filter((_, i) => i !== idx));

  const add = () => {
    if (!body.trim() && images.length === 0) return;
    const now = new Date();
    const entry = {
      id: Date.now(),
      body: body.trim(),
      images: [...images],
      energy,
      tags: tag.trim() ? tag.split(",").map((t) => t.trim().toLowerCase()).filter(Boolean) : [],
      date: now.toISOString(),
      timestamp: now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
    };
    setEntries((prev) => [entry, ...prev]);
    setBody("");
    setTag("");
    setImages([]);
    setEnergy(3);
  };

  const remove = (id) => {
    setEntries((prev) => prev.filter((e) => e.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  const filtered = filterTag === "all" ? entries : entries.filter((e) => e.tags.includes(filterTag));
  const selected = entries.find((e) => e.id === selectedId);

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  };
  const formatTime = (iso) => {
    const d = new Date(iso);

            <h2 style={{ fontFamily: base.fontSerif, fontSize: 22, fontWeight: 700, color: theme.dark, margin: 0 }}>
              What's up?
            </h2>
            <div style={{ fontFamily: base.fontSans, fontSize: 11, color: theme.muted }}>
              {new Date().toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" })} · {new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}
            </div>
          </div>
          <textarea
            ref={textRef}
            value={body}
            onChange={(e) => setBody(e.target.value)}
            onPaste={handlePaste}
            onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.borderColor = theme.teal; }}
            onDragLeave={(e) => { e.currentTarget.style.borderColor = theme.border; }}
